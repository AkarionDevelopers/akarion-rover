<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Morty Rover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #eee;
      height: 100dvh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Fullscreen rover camera */
    #remote-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .video-placeholder {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.9rem;
      background: #1a1a2e;
      z-index: 0;
    }
    .video-placeholder.hidden { display: none; }

    /* Self-view */
    #self-video {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 90px;
      height: 68px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.15);
      z-index: 10;
    }

    /* Status bar */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 14px;
      background: linear-gradient(rgba(0,0,0,0.6), transparent);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
      pointer-events: none;
    }
    .status-bar .label { color: #e94560; font-size: 0.85rem; font-weight: 600; }
    .status-bar .info { color: rgba(255,255,255,0.6); font-size: 0.75rem; }

    /* Role badge */
    .role-badge {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 20;
      transition: background 0.3s, color 0.3s;
      pointer-events: none;
    }
    .role-badge.driver {
      background: rgba(78,204,163,0.25);
      color: #4ecca3;
      border: 1.5px solid rgba(78,204,163,0.4);
    }
    .role-badge.spectator {
      background: rgba(233,69,96,0.2);
      color: #e94560;
      border: 1.5px solid rgba(233,69,96,0.3);
    }
    .role-badge.hidden { display: none; }

    /* Viewer list */
    .viewer-list {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 12px;
      z-index: 10;
      min-width: 120px;
      max-width: 200px;
    }
    .viewer-list.hidden { display: none; }
    .viewer-list-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
    }
    .viewer-list ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .viewer-list li {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .viewer-list .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .viewer-list .dot.driver { background: #4ecca3; }
    .viewer-list .dot.spectator { background: #e94560; }
    .viewer-list .role-tag {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.35);
      margin-left: auto;
    }

    /* Spectator banner */
    .spectator-banner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      z-index: 10;
      max-width: 90%;
    }
    .spectator-banner.active { display: block; }
    .spectator-banner .title { font-size: 0.85rem; color: #e94560; margin-bottom: 2px; }
    .spectator-banner .subtitle { font-size: 0.7rem; color: rgba(255,255,255,0.5); }

    /* D-pad overlay */
    .dpad {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      gap: 4px;
      z-index: 10;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .dpad.hidden { display: none; }
    .dpad:hover, .dpad:active { opacity: 0.85; }

    .dpad button {
      width: 52px;
      height: 52px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.8);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad button:active, .dpad button.active {
      background: rgba(233,69,96,0.7);
      border-color: rgba(233,69,96,0.9);
      opacity: 1;
    }

    .btn-up    { grid-area: up; }
    .btn-down  { grid-area: down; }
    .btn-left  { grid-area: left; }
    .btn-right { grid-area: right; }

    /* Name + connect screen */
    #connect-screen {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      transition: opacity 0.3s;
    }
    #connect-screen.hidden { opacity: 0; pointer-events: none; }
    #connect-screen h2 { color: #e94560; font-size: 1.4rem; }
    #connect-screen p { color: #888; font-size: 0.95rem; }

    .name-form {
      display: flex;
      gap: 8px;
    }
    .name-form input {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid #333;
      background: #16213e;
      color: #eee;
      font-size: 0.95rem;
      outline: none;
      width: 180px;
    }
    .name-form input:focus { border-color: #e94560; }
    .name-form button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .name-form button:hover { background: #d63a54; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="connect-screen">
    <h2>Morty Rover</h2>
    <p>Enter your name to join</p>
    <div class="name-form" id="name-form">
      <input type="text" id="name-input" placeholder="Your name" maxlength="30" autocomplete="off">
      <button id="join-btn">Join</button>
    </div>
    <div class="spinner hidden" id="connect-spinner"></div>
  </div>

  <div class="video-placeholder" id="video-placeholder">Rover camera offline</div>
  <video id="remote-video" autoplay playsinline></video>
  <video id="self-video" autoplay playsinline muted></video>

  <div class="status-bar">
    <span class="label">Morty Rover</span>
    <span class="info" id="status"></span>
  </div>

  <div class="role-badge hidden" id="role-badge"></div>

  <div class="viewer-list hidden" id="viewer-list">
    <div class="viewer-list-title">Viewers</div>
    <ul id="viewer-list-items"></ul>
  </div>

  <div class="spectator-banner" id="spectator-banner">
    <div class="title" id="spectator-title">Someone else is controlling the rover</div>
    <div class="subtitle">You'll get control when they're done or idle</div>
  </div>

  <div class="dpad hidden" id="dpad">
    <button class="btn-up" data-dir="forward">&#9650;</button>
    <button class="btn-left" data-dir="left">&#9664;</button>
    <button class="btn-right" data-dir="right">&#9654;</button>
    <button class="btn-down" data-dir="reverse">&#9660;</button>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const connectScreen = document.getElementById('connect-screen');
    const connectSpinner = document.getElementById('connect-spinner');
    const nameForm = document.getElementById('name-form');
    const nameInput = document.getElementById('name-input');
    const joinBtn = document.getElementById('join-btn');
    const spectatorBanner = document.getElementById('spectator-banner');
    const spectatorTitle = document.getElementById('spectator-title');
    const roleBadge = document.getElementById('role-badge');
    const viewerListEl = document.getElementById('viewer-list');
    const viewerListItems = document.getElementById('viewer-list-items');
    const dpad = document.getElementById('dpad');
    const buttons = document.querySelectorAll('.dpad button');
    const remoteVideo = document.getElementById('remote-video');
    const selfVideo = document.getElementById('self-video');
    const videoPlaceholder = document.getElementById('video-placeholder');

    let ws = null;
    let isController = false;
    let reconnectTimer = null;
    let pc = null;
    let localStream = null;
    let playerName = '';

    const pressed = new Set();
    let currentDirection = 'stop';
    let keepaliveInterval = null;

    const KEEPALIVE_MS = 800;
    const TURN_REPEAT_MS = 400;

    const RTC_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    };

    // --- Name input ---
    function submitName() {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      playerName = name;
      localStorage.setItem('morty-rover-name', name);
      nameForm.style.display = 'none';
      connectSpinner.classList.remove('hidden');
      connect();
    }

    joinBtn.addEventListener('click', submitName);
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitName();
    });

    // Restore saved name
    const savedName = localStorage.getItem('morty-rover-name');
    if (savedName) nameInput.value = savedName;

    // --- Viewer list ---
    function updateViewerList(viewers) {
      if (!viewers || viewers.length === 0) {
        viewerListEl.classList.add('hidden');
        return;
      }
      viewerListEl.classList.remove('hidden');
      viewerListItems.innerHTML = '';
      for (const v of viewers) {
        const li = document.createElement('li');
        const dot = document.createElement('span');
        dot.className = 'dot ' + (v.isDriver ? 'driver' : 'spectator');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = v.name;
        const tag = document.createElement('span');
        tag.className = 'role-tag';
        tag.textContent = v.isDriver ? 'Driver' : 'Spectator';
        li.appendChild(dot);
        li.appendChild(nameSpan);
        li.appendChild(tag);
        viewerListItems.appendChild(li);
      }
    }

    function setControllerMode() {
      isController = true;
      dpad.classList.remove('hidden');
      spectatorBanner.classList.remove('active');
      connectScreen.classList.add('hidden');
      statusEl.textContent = 'You have control';
      roleBadge.textContent = 'Driver';
      roleBadge.className = 'role-badge driver';
    }

    function setSpectatorMode(reason) {
      isController = false;
      dpad.classList.add('hidden');
      pressed.clear();
      setDirection('stop');
      spectatorTitle.textContent = reason || 'Someone else is controlling the rover';
      spectatorBanner.classList.add('active');
      connectScreen.classList.add('hidden');
      roleBadge.textContent = 'Spectator';
      roleBadge.className = 'role-badge spectator';
    }

    // --- Camera ---
    async function startCamera() {
      if (localStream) return;
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        selfVideo.srcObject = localStream;
      } catch (err) {
        console.warn('Camera not available:', err);
      }
    }

    // --- WebRTC ---
    function createPeerConnection() {
      closePeerConnection();

      pc = new RTCPeerConnection(RTC_CONFIG);

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.ontrack = (e) => {
        remoteVideo.srcObject = e.streams[0];
        videoPlaceholder.classList.add('hidden');
      };

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          wsSend({ type: 'ice-candidate', candidate: e.candidate });
        }
      };

      return pc;
    }

    function closePeerConnection() {
      if (pc) {
        pc.close();
        pc = null;
      }
      remoteVideo.srcObject = null;
      videoPlaceholder.classList.remove('hidden');
    }

    async function handleOffer(offer) {
      createPeerConnection();
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      wsSend({ type: 'answer', sdp: answer.sdp });
    }

    async function handleAnswer(answer) {
      if (!pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answer.sdp }));
    }

    async function handleIceCandidate(candidate) {
      if (!pc) return;
      await pc.addIceCandidate(new RTCIceCandidate(candidate));
    }

    // --- WebSocket ---
    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      }
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        clearTimeout(reconnectTimer);
        wsSend({ type: 'join', role: 'controller', name: playerName });
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'claimed') {
          setControllerMode();
          statusEl.textContent = msg.roverOnline ? 'You have control' : 'Waiting for rover...';
          startCamera();
        }

        if (msg.type === 'watching') {
          setSpectatorMode('Someone else is controlling the rover');
          startCamera();
        }

        if (msg.type === 'promoted') {
          setControllerMode();
        }

        if (msg.type === 'kicked') {
          setSpectatorMode('Disconnected due to inactivity');
        }

        if (msg.type === 'rover-offline') {
          statusEl.textContent = 'Rover camera offline';
          closePeerConnection();
        }

        if (msg.type === 'viewer-list') {
          updateViewerList(msg.viewers);
        }

        // WebRTC signaling
        if (msg.type === 'offer') handleOffer(msg);
        if (msg.type === 'answer') handleAnswer(msg);
        if (msg.type === 'ice-candidate') handleIceCandidate(msg.candidate);

        if (msg.type === 'peer-left') {
          closePeerConnection();
        }
      };

      ws.onclose = () => {
        isController = false;
        pressed.clear();
        setDirection('stop');
        closePeerConnection();
        dpad.classList.add('hidden');
        spectatorBanner.classList.remove('active');
        viewerListEl.classList.add('hidden');
        roleBadge.className = 'role-badge hidden';
        // Reconnect without showing name screen again
        connectScreen.classList.remove('hidden');
        nameForm.style.display = 'none';
        connectSpinner.classList.remove('hidden');
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    // --- Motor commands ---
    function sendCommand(action) {
      if (!isController) return;
      wsSend({ type: 'command', action });
    }

    function setDirection(dir) {
      if (dir === currentDirection) return;
      currentDirection = dir;
      buttons.forEach(b => b.classList.remove('active'));

      if (dir === 'stop') {
        clearInterval(keepaliveInterval);
        keepaliveInterval = null;
        sendCommand('stop');
        return;
      }

      const activeBtn = document.querySelector(`[data-dir="${dir}"]`);
      if (activeBtn) activeBtn.classList.add('active');

      const isTurn = dir === 'left' || dir === 'right';
      const interval = isTurn ? TURN_REPEAT_MS : KEEPALIVE_MS;

      sendCommand(dir);
      clearInterval(keepaliveInterval);
      keepaliveInterval = setInterval(() => sendCommand(dir), interval);
    }

    function updateDirection() {
      if (pressed.has('forward'))       setDirection('forward');
      else if (pressed.has('reverse'))  setDirection('reverse');
      else if (pressed.has('left'))     setDirection('left');
      else if (pressed.has('right'))    setDirection('right');
      else                              setDirection('stop');
    }

    // Keyboard
    const keyMap = {
      ArrowUp: 'forward', ArrowDown: 'reverse',
      ArrowLeft: 'left', ArrowRight: 'right',
    };

    document.addEventListener('keydown', (e) => {
      if (!isController) return;
      const dir = keyMap[e.key];
      if (!dir || pressed.has(dir)) return;
      e.preventDefault();
      pressed.add(dir);
      updateDirection();
    });

    document.addEventListener('keyup', (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      pressed.delete(dir);
      updateDirection();
    });

    // Mouse + touch on buttons
    buttons.forEach(btn => {
      const dir = btn.dataset.dir;
      function start(e) { e.preventDefault(); pressed.add(dir); updateDirection(); }
      function end(e) { e.preventDefault(); pressed.delete(dir); updateDirection(); }

      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', end);
      btn.addEventListener('mouseleave', end);
      btn.addEventListener('touchstart', start, { passive: false });
      btn.addEventListener('touchend', end, { passive: false });
      btn.addEventListener('touchcancel', end, { passive: false });
    });

    window.addEventListener('blur', () => {
      pressed.clear();
      updateDirection();
    });
  </script>
</body>
</html>
