<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Morty Rover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    h1 {
      font-size: 1.4rem;
      margin-top: 0.8rem;
      margin-bottom: 0.2rem;
      color: #e94560;
    }

    .status {
      font-size: 0.8rem;
      margin-bottom: 0.8rem;
      color: #888;
    }
    .status.connected { color: #4ecca3; }
    .status.busy { color: #e94560; }

    /* Busy overlay */
    #busy-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    #busy-screen.active { display: flex; }
    #busy-screen h2 { color: #e94560; font-size: 1.4rem; }
    #busy-screen p { color: #888; font-size: 0.95rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Video area */
    .video-container {
      position: relative;
      width: min(100%, 480px);
      aspect-ratio: 4/3;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }

    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.9rem;
    }

    #self-video {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 80px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid #333;
      z-index: 2;
    }

    /* D-pad */
    .dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      gap: 6px;
      margin-bottom: 0.8rem;
    }

    .dpad button {
      width: 64px;
      height: 64px;
      border: 2px solid #333;
      border-radius: 14px;
      background: #16213e;
      color: #eee;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad button:active, .dpad button.active {
      background: #e94560;
      border-color: #e94560;
    }

    .btn-up    { grid-area: up; }
    .btn-down  { grid-area: down; }
    .btn-left  { grid-area: left; }
    .btn-right { grid-area: right; }

    /* Speed slider */
    .speed-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.5rem;
    }
    .speed-control label { font-size: 0.8rem; color: #888; }
    .speed-control input[type="range"] {
      width: 160px;
      accent-color: #e94560;
    }
    .speed-control .speed-val {
      font-size: 0.8rem;
      color: #4ecca3;
      min-width: 2ch;
      text-align: right;
    }

    .hint {
      font-size: 0.7rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="busy-screen">
    <div class="spinner"></div>
    <h2>Rover is in use</h2>
    <p>Someone else is currently controlling the rover.</p>
    <p>Waiting for them to finish...</p>
  </div>

  <h1>Morty Rover</h1>
  <div class="status" id="status">Connecting...</div>

  <div class="video-container">
    <div class="video-placeholder" id="video-placeholder">Rover camera offline</div>
    <video id="remote-video" autoplay playsinline></video>
    <video id="self-video" autoplay playsinline muted></video>
  </div>

  <div class="dpad">
    <button class="btn-up" data-dir="forward">&#9650;</button>
    <button class="btn-left" data-dir="left">&#9664;</button>
    <button class="btn-right" data-dir="right">&#9654;</button>
    <button class="btn-down" data-dir="reverse">&#9660;</button>
  </div>

  <div class="speed-control">
    <label>Speed</label>
    <input type="range" id="speed" min="50" max="255" value="200">
    <span class="speed-val" id="speed-val">200</span>
  </div>

  <p class="hint">Arrow keys or tap the buttons</p>

  <script>
    const statusEl = document.getElementById('status');
    const busyScreen = document.getElementById('busy-screen');
    const speedSlider = document.getElementById('speed');
    const speedVal = document.getElementById('speed-val');
    const buttons = document.querySelectorAll('.dpad button');
    const remoteVideo = document.getElementById('remote-video');
    const selfVideo = document.getElementById('self-video');
    const videoPlaceholder = document.getElementById('video-placeholder');

    let ws = null;
    let claimed = false;
    let reconnectTimer = null;
    let pc = null;
    let localStream = null;

    const pressed = new Set();
    let currentDirection = 'stop';
    let keepaliveInterval = null;

    const KEEPALIVE_MS = 800;
    const TURN_REPEAT_MS = 400;

    const RTC_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    };

    speedSlider.addEventListener('input', () => {
      speedVal.textContent = speedSlider.value;
    });

    // --- Camera ---
    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        selfVideo.srcObject = localStream;
      } catch (err) {
        console.warn('Camera not available:', err);
      }
    }

    // --- WebRTC ---
    function createPeerConnection() {
      closePeerConnection();

      pc = new RTCPeerConnection(RTC_CONFIG);

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.ontrack = (e) => {
        remoteVideo.srcObject = e.streams[0];
        videoPlaceholder.style.display = 'none';
      };

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          wsSend({ type: 'ice-candidate', candidate: e.candidate });
        }
      };

      return pc;
    }

    function closePeerConnection() {
      if (pc) {
        pc.close();
        pc = null;
      }
      remoteVideo.srcObject = null;
      videoPlaceholder.style.display = 'flex';
    }

    async function handleOffer(offer) {
      createPeerConnection();
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      wsSend({ type: 'answer', sdp: answer.sdp });
    }

    async function handleAnswer(answer) {
      if (!pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answer.sdp }));
    }

    async function handleIceCandidate(candidate) {
      if (!pc) return;
      await pc.addIceCandidate(new RTCIceCandidate(candidate));
    }

    // --- WebSocket ---
    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      }
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        clearTimeout(reconnectTimer);
        wsSend({ type: 'join', role: 'controller' });
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'claimed') {
          claimed = true;
          busyScreen.classList.remove('active');
          statusEl.textContent = msg.roverOnline
            ? 'Connected — rover online'
            : 'Connected — waiting for rover';
          statusEl.className = 'status connected';
          startCamera();
        }

        if (msg.type === 'busy') {
          claimed = false;
          busyScreen.classList.add('active');
          statusEl.textContent = 'Rover is busy';
          statusEl.className = 'status busy';
        }

        if (msg.type === 'rover-online') {
          statusEl.textContent = 'Connected — rover online';
        }

        if (msg.type === 'rover-offline') {
          statusEl.textContent = 'Connected — rover camera offline';
          closePeerConnection();
        }

        // WebRTC signaling
        if (msg.type === 'offer') handleOffer(msg);
        if (msg.type === 'answer') handleAnswer(msg);
        if (msg.type === 'ice-candidate') handleIceCandidate(msg.candidate);

        if (msg.type === 'peer-left') {
          closePeerConnection();
        }
      };

      ws.onclose = () => {
        claimed = false;
        pressed.clear();
        setDirection('stop');
        closePeerConnection();
        statusEl.textContent = 'Disconnected — reconnecting...';
        statusEl.className = 'status';
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    // --- Motor commands ---
    function sendCommand(action) {
      if (!claimed) return;
      wsSend({ type: 'command', action, speed: parseInt(speedSlider.value) });
    }

    function setDirection(dir) {
      if (dir === currentDirection) return;
      currentDirection = dir;
      buttons.forEach(b => b.classList.remove('active'));

      if (dir === 'stop') {
        clearInterval(keepaliveInterval);
        keepaliveInterval = null;
        sendCommand('stop');
        return;
      }

      const activeBtn = document.querySelector(`[data-dir="${dir}"]`);
      if (activeBtn) activeBtn.classList.add('active');

      const isTurn = dir === 'left' || dir === 'right';
      const interval = isTurn ? TURN_REPEAT_MS : KEEPALIVE_MS;

      sendCommand(dir);
      clearInterval(keepaliveInterval);
      keepaliveInterval = setInterval(() => sendCommand(dir), interval);
    }

    function updateDirection() {
      if (pressed.has('forward'))       setDirection('forward');
      else if (pressed.has('reverse'))  setDirection('reverse');
      else if (pressed.has('left'))     setDirection('left');
      else if (pressed.has('right'))    setDirection('right');
      else                              setDirection('stop');
    }

    // Keyboard
    const keyMap = {
      ArrowUp: 'forward', ArrowDown: 'reverse',
      ArrowLeft: 'left', ArrowRight: 'right',
    };

    document.addEventListener('keydown', (e) => {
      const dir = keyMap[e.key];
      if (!dir || pressed.has(dir)) return;
      e.preventDefault();
      pressed.add(dir);
      updateDirection();
    });

    document.addEventListener('keyup', (e) => {
      const dir = keyMap[e.key];
      if (!dir) return;
      e.preventDefault();
      pressed.delete(dir);
      updateDirection();
    });

    // Mouse + touch on buttons
    buttons.forEach(btn => {
      const dir = btn.dataset.dir;
      function start(e) { e.preventDefault(); pressed.add(dir); updateDirection(); }
      function end(e) { e.preventDefault(); pressed.delete(dir); updateDirection(); }

      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', end);
      btn.addEventListener('mouseleave', end);
      btn.addEventListener('touchstart', start, { passive: false });
      btn.addEventListener('touchend', end, { passive: false });
      btn.addEventListener('touchcancel', end, { passive: false });
    });

    window.addEventListener('blur', () => {
      pressed.clear();
      updateDirection();
    });

    connect();
  </script>
</body>
</html>
