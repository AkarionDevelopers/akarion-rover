<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Morty Rover — Tablet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #eee;
      height: 100dvh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Main driver video (fullscreen) */
    #driver-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Spectator video strip */
    .spectator-strip {
      position: fixed;
      top: 40px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .spectator-tile {
      position: relative;
      width: 110px;
      height: 82px;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: #111;
    }
    .spectator-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .spectator-tile .name-tag {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2px 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      font-size: 0.55rem;
      color: rgba(255,255,255,0.8);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Driver name overlay */
    .driver-name {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 14px;
      border-radius: 12px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(78,204,163,0.3);
      font-size: 0.75rem;
      color: #4ecca3;
      z-index: 10;
      pointer-events: none;
    }
    .driver-name.hidden { display: none; }

    /* Placeholder when no driver */
    .placeholder {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 1;
      background: #1a1a2e;
      transition: opacity 0.3s;
    }
    .placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .placeholder p { color: #888; font-size: 1rem; }

    .sleeping-face {
      font-size: 6rem;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    .sleeping-face .zzz {
      font-size: 2rem;
      position: absolute;
      top: -0.5rem;
      right: -1.5rem;
      animation: float 2s ease-in-out infinite;
      opacity: 0.6;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(-12px); opacity: 1; }
    }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #333;
      border-top-color: #4ecca3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Self-view (rover camera preview) */
    #self-video {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 120px;
      height: 90px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
      z-index: 10;
    }

    /* Status bar */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: linear-gradient(rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #888;
      flex-shrink: 0;
    }
    .status-dot.online { background: #4ecca3; }
    .status-dot.waiting { background: #e9a045; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 0.85rem;
      color: #ccc;
    }

    .viewer-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: #666;
    }

    /* Tap-to-start overlay (Safari requires user gesture for camera) */
    .tap-to-start {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tap-to-start.hidden { display: none; }
    .tap-to-start .icon { font-size: 4rem; }
    .tap-to-start h2 { color: #e94560; font-size: 1.4rem; }
    .tap-to-start p { color: #888; font-size: 0.9rem; }

    /* Mute button */
    .mute-btn {
      position: fixed;
      bottom: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .mute-btn.hidden { display: none; }
    .mute-btn.muted {
      background: rgba(233,69,96,0.5);
      border-color: rgba(233,69,96,0.7);
    }
  </style>
</head>
<body>
  <div class="tap-to-start" id="tap-to-start">
    <div class="icon">&#128247;</div>
    <h2>Morty Rover</h2>
    <p>Tap to start camera</p>
  </div>

  <div class="placeholder" id="placeholder">
    <div class="sleeping-face" id="sleeping-face" style="position:relative;display:inline-block">
      <span>&#128564;</span>
      <span class="zzz">&#128164;</span>
    </div>
    <div class="spinner hidden" id="connecting-spinner"></div>
    <p id="placeholder-text"></p>
  </div>

  <video id="driver-video" autoplay playsinline></video>
  <div class="driver-name hidden" id="driver-name"></div>
  <div class="spectator-strip" id="spectator-strip"></div>

  <video id="self-video" autoplay playsinline muted></video>

  <div class="status-bar">
    <div class="status-dot waiting" id="status-dot"></div>
    <span class="status-text" id="status-text">Connecting...</span>
    <span class="viewer-count" id="viewer-count"></span>
  </div>

  <button class="mute-btn hidden muted" id="mute-btn" title="Toggle microphone">&#128263;</button>

  <script>
    const driverVideo = document.getElementById('driver-video');
    const driverNameEl = document.getElementById('driver-name');
    const spectatorStrip = document.getElementById('spectator-strip');
    const selfVideo = document.getElementById('self-video');
    const placeholder = document.getElementById('placeholder');
    const placeholderText = document.getElementById('placeholder-text');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const sleepingFace = document.getElementById('sleeping-face');
    const connectingSpinner = document.getElementById('connecting-spinner');
    const viewerCountEl = document.getElementById('viewer-count');
    const muteBtn = document.getElementById('mute-btn');

    const tapToStart = document.getElementById('tap-to-start');

    let ws = null;
    let localStream = null;
    let reconnectTimer = null;
    let wakeLock = null;
    let cameraReady = false;

    // Multiple peer connections, keyed by peerId
    // { pc, stream, isController, name, videoEl, tileEl, retryCount, iceCandidateQueue, remoteDescSet, timeoutId }
    const peers = new Map();
    let currentControllerId = null;

    const RTC_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    };

    // --- Wake Lock (keep screen on) ---
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch {}
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    let isMuted = true;

    function updateMuteUI() {
      muteBtn.textContent = isMuted ? '\u{1F507}' : '\u{1F50A}';
      muteBtn.classList.toggle('muted', isMuted);
      if (localStream) {
        localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      }
    }

    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      updateMuteUI();
    });

    // --- Camera + Audio ---
    async function startCamera() {
      if (localStream) return;
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true,
        });
        selfVideo.srcObject = localStream;
        localStream.getAudioTracks().forEach(t => t.enabled = false);
        muteBtn.classList.remove('hidden');
        cameraReady = true;
      } catch (err) {
        console.warn('Camera/mic not available:', err);
        // Still allow connecting even if camera fails
        cameraReady = true;
      }
    }

    // Safari requires a user gesture before getUserMedia works.
    // Start camera on tap, then connect WebSocket.
    tapToStart.addEventListener('click', async () => {
      tapToStart.classList.add('hidden');
      await startCamera();
      connect();
    });

    // --- Video layout ---
    function layoutVideos() {
      // Driver video
      if (currentControllerId) {
        const driverPeer = peers.get(currentControllerId);
        if (driverPeer && driverPeer.stream) {
          driverVideo.srcObject = driverPeer.stream;
          driverNameEl.textContent = driverPeer.name || '';
          driverNameEl.classList.remove('hidden');
          placeholder.classList.add('hidden');
        }
      } else {
        driverVideo.srcObject = null;
        driverNameEl.classList.add('hidden');
      }

      // Spectator tiles
      spectatorStrip.innerHTML = '';
      for (const [peerId, peer] of peers) {
        if (peerId === currentControllerId) continue;
        if (!peer.stream) continue;

        const tile = document.createElement('div');
        tile.className = 'spectator-tile';

        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.srcObject = peer.stream;

        const nameTag = document.createElement('div');
        nameTag.className = 'name-tag';
        nameTag.textContent = peer.name || 'Spectator';

        tile.appendChild(video);
        tile.appendChild(nameTag);
        spectatorStrip.appendChild(tile);
      }
    }

    // --- WebRTC (multi-peer) ---
    const RETRY_DELAY = 3000;
    const CONNECTION_TIMEOUT = 15000;

    async function createPeerOffer(peerId, isController, name) {
      closePeer(peerId);

      const pc = new RTCPeerConnection(RTC_CONFIG);

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      const peerData = {
        pc, stream: null, isController, name: name || 'Unknown',
        iceCandidateQueue: [], remoteDescSet: false, retryCount: 0, timeoutId: null,
      };
      peers.set(peerId, peerData);

      pc.ontrack = (e) => {
        peerData.stream = e.streams[0];
        layoutVideos();
      };

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          wsSend({ type: 'ice-candidate', candidate: e.candidate, peerId });
        }
      };

      pc.oniceconnectionstatechange = () => {
        const state = pc.iceConnectionState;
        console.log(`Peer ${peerId} ICE: ${state}`);
        if (state === 'failed') {
          retryPeer(peerId);
        } else if (state === 'disconnected') {
          setTimeout(() => {
            const p = peers.get(peerId);
            if (p && p.pc.iceConnectionState === 'disconnected') {
              retryPeer(peerId);
            }
          }, 5000);
        }
      };

      if (isController) {
        currentControllerId = peerId;
      }

      peerData.timeoutId = setTimeout(() => {
        const p = peers.get(peerId);
        if (p && !p.stream) {
          console.warn(`Peer ${peerId} connection timed out, retrying`);
          retryPeer(peerId);
        }
      }, CONNECTION_TIMEOUT);

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        wsSend({ type: 'offer', sdp: offer.sdp, peerId });
      } catch (err) {
        console.error(`Failed to create offer for ${peerId}:`, err);
        setTimeout(() => retryPeer(peerId), RETRY_DELAY);
      }

      updateViewerCount();
    }

    function retryPeer(peerId) {
      const peer = peers.get(peerId);
      if (!peer) return;
      const { isController, name } = peer;
      const retryCount = peer.retryCount + 1;
      if (retryCount > 5) {
        console.error(`Giving up on peer ${peerId} after 5 retries`);
        closePeer(peerId);
        return;
      }
      console.log(`Retrying peer ${peerId} (attempt ${retryCount})`);
      closePeer(peerId);
      setTimeout(() => {
        if (!peers.has(peerId)) {
          createPeerOffer(peerId, isController, name).then(() => {
            const p = peers.get(peerId);
            if (p) p.retryCount = retryCount;
          });
        }
      }, RETRY_DELAY);
    }

    function closePeer(peerId) {
      const peer = peers.get(peerId);
      if (peer) {
        clearTimeout(peer.timeoutId);
        peer.pc.oniceconnectionstatechange = null;
        peer.pc.ontrack = null;
        peer.pc.onicecandidate = null;
        peer.pc.close();
        peers.delete(peerId);
      }
      if (peerId === currentControllerId) {
        currentControllerId = null;
        driverVideo.srcObject = null;
        driverNameEl.classList.add('hidden');
      }
      layoutVideos();
      updateViewerCount();

      if (peers.size === 0) {
        placeholder.classList.remove('hidden');
      }
    }

    async function handleAnswer(peerId, sdp) {
      const peer = peers.get(peerId);
      if (!peer) return;
      try {
        await peer.pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp }));
        peer.remoteDescSet = true;
        for (const candidate of peer.iceCandidateQueue) {
          await peer.pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(() => {});
        }
        peer.iceCandidateQueue = [];
      } catch (err) {
        console.error(`Failed to set answer for ${peerId}:`, err);
        retryPeer(peerId);
      }
    }

    async function handleIceCandidate(peerId, candidate) {
      const peer = peers.get(peerId);
      if (!peer) return;
      if (!peer.remoteDescSet) {
        peer.iceCandidateQueue.push(candidate);
        return;
      }
      try {
        await peer.pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (err) {
        console.warn(`ICE candidate error for ${peerId}:`, err);
      }
    }

    function updateViewerCount() {
      const count = peers.size;
      viewerCountEl.textContent = count > 0 ? `${count} viewer${count !== 1 ? 's' : ''}` : '';
    }

    // --- Status helpers ---
    function showSleeping(show) {
      sleepingFace.style.display = show ? 'inline-block' : 'none';
      connectingSpinner.classList.toggle('hidden', show);
    }

    function setStatus(text, state) {
      statusText.textContent = text;
      statusDot.className = 'status-dot ' + (state || '');
    }

    // --- WebSocket ---
    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      }
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        clearTimeout(reconnectTimer);
        wsSend({ type: 'join', role: 'rover' });
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'claimed') {
          setStatus('Waiting for viewers...', 'waiting');
          placeholderText.textContent = '';
          showSleeping(true);
          requestWakeLock();
        }

        if (msg.type === 'busy') {
          setStatus('Another rover tablet is connected', '');
          placeholderText.textContent = 'Another rover tablet is already connected.';
        }

        if (msg.type === 'peer-joined') {
          setStatus(msg.isController ? 'Driver connected' : 'Viewer connected', 'online');
          createPeerOffer(msg.peerId, msg.isController, msg.name);
        }

        if (msg.type === 'peer-left') {
          closePeer(msg.peerId);
          if (peers.size === 0) {
            setStatus('Waiting for viewers...', 'waiting');
            placeholderText.textContent = '';
            showSleeping(true);
          }
        }

        if (msg.type === 'controller-changed') {
          currentControllerId = msg.peerId;
          // Update the isController flag on peers
          for (const [pid, p] of peers) {
            p.isController = (pid === msg.peerId);
          }
          layoutVideos();
          setStatus('Driver changed', 'online');
        }

        // WebRTC signaling (with peerId)
        if (msg.type === 'answer') handleAnswer(msg.peerId, msg.sdp);
        if (msg.type === 'ice-candidate') handleIceCandidate(msg.peerId, msg.candidate);
      };

      ws.onclose = () => {
        for (const [peerId] of peers) closePeer(peerId);
        currentControllerId = null;
        setStatus('Disconnected — reconnecting...', '');
        placeholderText.textContent = 'Reconnecting...';
        showSleeping(false);
        placeholder.classList.remove('hidden');
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    // connect() is called after tap-to-start (required for Safari camera access)
  </script>
</body>
</html>
