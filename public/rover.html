<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Morty Rover — Tablet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #eee;
      height: 100dvh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Full-screen remote video (controller's face) */
    #remote-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Placeholder when no driver */
    .placeholder {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 1;
      background: #1a1a2e;
      transition: opacity 0.3s;
    }
    .placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .placeholder h1 { color: #e94560; font-size: 1.8rem; }
    .placeholder p { color: #888; font-size: 1rem; }
    .placeholder .spinner {
      width: 48px; height: 48px;
      border: 4px solid #333;
      border-top-color: #4ecca3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Self-view (rover camera preview) */
    #self-video {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 120px;
      height: 90px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
      z-index: 10;
    }

    /* Status bar */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: linear-gradient(rgba(0,0,0,0.7), transparent);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #888;
      flex-shrink: 0;
    }
    .status-dot.online { background: #4ecca3; }
    .status-dot.waiting { background: #e9a045; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 0.85rem;
      color: #ccc;
    }

    .viewer-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: #666;
    }

    /* Viewer list */
    .viewer-list {
      position: fixed;
      bottom: 70px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 12px;
      z-index: 10;
      min-width: 120px;
      max-width: 200px;
    }
    .viewer-list.hidden { display: none; }
    .viewer-list-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
    }
    .viewer-list ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .viewer-list li {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .viewer-list .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .viewer-list .dot.driver { background: #4ecca3; }
    .viewer-list .dot.spectator { background: #e94560; }
    .viewer-list .role-tag {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.35);
      margin-left: auto;
    }
    /* Mute button */
    .mute-btn {
      position: fixed;
      bottom: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .mute-btn.hidden { display: none; }
    .mute-btn.muted {
      background: rgba(233,69,96,0.5);
      border-color: rgba(233,69,96,0.7);
    }
  </style>
</head>
<body>
  <div class="placeholder" id="placeholder">
    <h1>Morty Rover</h1>
    <div class="spinner"></div>
    <p id="placeholder-text">Waiting for a driver...</p>
  </div>

  <video id="remote-video" autoplay playsinline></video>
  <video id="self-video" autoplay playsinline muted></video>

  <div class="status-bar">
    <div class="status-dot waiting" id="status-dot"></div>
    <span class="status-text" id="status-text">Connecting...</span>
    <span class="viewer-count" id="viewer-count"></span>
  </div>

  <button class="mute-btn hidden muted" id="mute-btn" title="Toggle microphone">&#128263;</button>

  <div class="viewer-list hidden" id="viewer-list">
    <div class="viewer-list-title">Viewers</div>
    <ul id="viewer-list-items"></ul>
  </div>

  <script>
    const remoteVideo = document.getElementById('remote-video');
    const selfVideo = document.getElementById('self-video');
    const placeholder = document.getElementById('placeholder');
    const placeholderText = document.getElementById('placeholder-text');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const viewerCountEl = document.getElementById('viewer-count');

    const muteBtn = document.getElementById('mute-btn');
    const viewerListEl = document.getElementById('viewer-list');
    const viewerListItems = document.getElementById('viewer-list-items');

    let ws = null;
    let localStream = null;
    let reconnectTimer = null;
    let wakeLock = null;

    // Multiple peer connections, keyed by peerId
    const peers = new Map(); // peerId -> { pc, stream }
    let currentControllerId = null;

    const RTC_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    };

    // --- Wake Lock (keep screen on) ---
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch {}
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    let isMuted = true;

    function updateMuteUI() {
      muteBtn.textContent = isMuted ? '\u{1F507}' : '\u{1F50A}';
      muteBtn.classList.toggle('muted', isMuted);
      if (localStream) {
        localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      }
    }

    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      updateMuteUI();
    });

    // --- Camera + Audio ---
    async function startCamera() {
      if (localStream) return;
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true,
        });
        selfVideo.srcObject = localStream;
        localStream.getAudioTracks().forEach(t => t.enabled = false);
        muteBtn.classList.remove('hidden');
      } catch (err) {
        console.warn('Camera/mic not available:', err);
      }
    }

    // --- WebRTC (multi-peer) ---
    const RETRY_DELAY = 3000;
    const CONNECTION_TIMEOUT = 15000;

    async function createPeerOffer(peerId, isController) {
      closePeer(peerId);

      const pc = new RTCPeerConnection(RTC_CONFIG);

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      const peerData = { pc, stream: null, iceCandidateQueue: [], remoteDescSet: false, retryCount: 0, isController, timeoutId: null };
      peers.set(peerId, peerData);

      pc.ontrack = (e) => {
        peerData.stream = e.streams[0];
        if (peerId === currentControllerId) {
          showControllerVideo();
        }
      };

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          wsSend({ type: 'ice-candidate', candidate: e.candidate, peerId });
        }
      };

      pc.oniceconnectionstatechange = () => {
        const state = pc.iceConnectionState;
        console.log(`Peer ${peerId} ICE: ${state}`);
        if (state === 'failed') {
          retryPeer(peerId);
        } else if (state === 'disconnected') {
          // Give it a moment to recover before retrying
          setTimeout(() => {
            const p = peers.get(peerId);
            if (p && p.pc.iceConnectionState === 'disconnected') {
              retryPeer(peerId);
            }
          }, 5000);
        }
      };

      if (isController) {
        currentControllerId = peerId;
      }

      // Timeout: if no connection established, retry
      peerData.timeoutId = setTimeout(() => {
        const p = peers.get(peerId);
        if (p && !p.stream) {
          console.warn(`Peer ${peerId} connection timed out, retrying`);
          retryPeer(peerId);
        }
      }, CONNECTION_TIMEOUT);

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        wsSend({ type: 'offer', sdp: offer.sdp, peerId });
      } catch (err) {
        console.error(`Failed to create offer for ${peerId}:`, err);
        setTimeout(() => retryPeer(peerId), RETRY_DELAY);
      }

      updateViewerCount();
    }

    function retryPeer(peerId) {
      const peer = peers.get(peerId);
      if (!peer) return;
      const wasController = peer.isController;
      const retryCount = peer.retryCount + 1;
      if (retryCount > 5) {
        console.error(`Giving up on peer ${peerId} after 5 retries`);
        closePeer(peerId);
        return;
      }
      console.log(`Retrying peer ${peerId} (attempt ${retryCount})`);
      closePeer(peerId);
      setTimeout(() => {
        // Only retry if the peer hasn't been re-added by the server
        if (!peers.has(peerId)) {
          createPeerOffer(peerId, wasController).then(() => {
            const p = peers.get(peerId);
            if (p) p.retryCount = retryCount;
          });
        }
      }, RETRY_DELAY);
    }

    function closePeer(peerId) {
      const peer = peers.get(peerId);
      if (peer) {
        clearTimeout(peer.timeoutId);
        peer.pc.oniceconnectionstatechange = null;
        peer.pc.ontrack = null;
        peer.pc.onicecandidate = null;
        peer.pc.close();
        peers.delete(peerId);
      }
      if (peerId === currentControllerId) {
        currentControllerId = null;
        remoteVideo.srcObject = null;
        placeholder.classList.remove('hidden');
      }
      updateViewerCount();
    }

    function showControllerVideo() {
      if (!currentControllerId) return;
      const peer = peers.get(currentControllerId);
      if (peer && peer.stream) {
        remoteVideo.srcObject = peer.stream;
        placeholder.classList.add('hidden');
      }
    }

    async function handleAnswer(peerId, sdp) {
      const peer = peers.get(peerId);
      if (!peer) return;
      try {
        await peer.pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp }));
        peer.remoteDescSet = true;
        // Flush queued ICE candidates
        for (const candidate of peer.iceCandidateQueue) {
          await peer.pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(() => {});
        }
        peer.iceCandidateQueue = [];
      } catch (err) {
        console.error(`Failed to set answer for ${peerId}:`, err);
        retryPeer(peerId);
      }
    }

    async function handleIceCandidate(peerId, candidate) {
      const peer = peers.get(peerId);
      if (!peer) return;
      if (!peer.remoteDescSet) {
        peer.iceCandidateQueue.push(candidate);
        return;
      }
      try {
        await peer.pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (err) {
        console.warn(`ICE candidate error for ${peerId}:`, err);
      }
    }

    function updateViewerCount() {
      const count = peers.size;
      viewerCountEl.textContent = count > 0 ? `${count} viewer${count !== 1 ? 's' : ''}` : '';
    }

    // --- Viewer list ---
    function updateViewerList(viewers) {
      if (!viewers || viewers.length === 0) {
        viewerListEl.classList.add('hidden');
        return;
      }
      viewerListEl.classList.remove('hidden');
      viewerListItems.innerHTML = '';
      for (const v of viewers) {
        const li = document.createElement('li');
        const dot = document.createElement('span');
        dot.className = 'dot ' + (v.isDriver ? 'driver' : 'spectator');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = v.name;
        const tag = document.createElement('span');
        tag.className = 'role-tag';
        tag.textContent = v.isDriver ? 'Driver' : 'Spectator';
        li.appendChild(dot);
        li.appendChild(nameSpan);
        li.appendChild(tag);
        viewerListItems.appendChild(li);
      }
    }

    // --- Status helpers ---
    function setStatus(text, state) {
      statusText.textContent = text;
      statusDot.className = 'status-dot ' + (state || '');
    }

    // --- WebSocket ---
    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      }
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        clearTimeout(reconnectTimer);
        wsSend({ type: 'join', role: 'rover' });
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'claimed') {
          setStatus('Waiting for viewers...', 'waiting');
          placeholderText.textContent = 'Waiting for a driver...';
          startCamera();
          requestWakeLock();
        }

        if (msg.type === 'busy') {
          setStatus('Another rover tablet is connected', '');
          placeholderText.textContent = 'Another rover tablet is already connected.';
        }

        if (msg.type === 'peer-joined') {
          setStatus(msg.isController ? 'Driver connected' : 'Viewer connected', 'online');
          createPeerOffer(msg.peerId, msg.isController);
        }

        if (msg.type === 'peer-left') {
          closePeer(msg.peerId);
          if (peers.size === 0) {
            setStatus('Waiting for viewers...', 'waiting');
            placeholderText.textContent = 'Waiting for a driver...';
          }
        }

        if (msg.type === 'viewer-list') {
          updateViewerList(msg.viewers);
        }

        if (msg.type === 'controller-changed') {
          currentControllerId = msg.peerId;
          showControllerVideo();
          setStatus('Driver changed', 'online');
        }

        // WebRTC signaling (with peerId)
        if (msg.type === 'answer') handleAnswer(msg.peerId, msg.sdp);
        if (msg.type === 'ice-candidate') handleIceCandidate(msg.peerId, msg.candidate);
      };

      ws.onclose = () => {
        // Close all peer connections
        for (const [peerId] of peers) closePeer(peerId);
        currentControllerId = null;
        setStatus('Disconnected — reconnecting...', '');
        placeholderText.textContent = 'Connection lost. Reconnecting...';
        placeholder.classList.remove('hidden');
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
